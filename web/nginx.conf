server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # config.js 는 런타임 생성물 — 캐시 금지(다음 기동 시 API base 변경 반영).
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    # SPA fallback: 알 수 없는 경로는 index.html 로(클라이언트 라우팅).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
