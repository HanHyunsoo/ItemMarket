# 두 가지 모드로 동작한다.
#
# 1) 로컬 개발용 인프라만 (기본, 프로필 없음) — 기존 워크플로 그대로:
#      docker compose up -d       # 최초 기동 시 db/ddl.sql 자동 실행(스키마+시드)
#      docker compose down        # 컨테이너 종료(데이터 유지)
#      docker compose down -v     # 볼륨까지 삭제(스키마 초기화 → 다음 up에서 ddl 재실행)
#    → postgres(+redis)만 뜨고, api/web 은 로컬에서 dotnet run / vite 로 띄운다.
#
# 2) 풀스택 컨테이너 (프로필 app) — 원커맨드 실행:
#      docker compose --profile app up            # postgres + redis + api + web
#      docker compose --profile app down -v
#    → api :8080, web :8081 로 노출(포트/이름은 아래 환경변수로 오버라이드 가능).
#
# 컨테이너 이름/호스트 포트는 환경변수로 바꿀 수 있어(기본값은 기존과 동일) 라이브 데모와
# 겹치지 않는 대체 포트로 별도 스택을 띄울 수 있다. 예:
#   PG_CONTAINER=verify-db PG_PORT=5433 REDIS_CONTAINER=verify-redis REDIS_PORT=6380 \
#   API_PORT=8080 WEB_PORT=8081 docker compose -p verify --profile app up -d
services:
  postgres:
    image: postgres:16
    container_name: ${PG_CONTAINER:-item-market-db}
    restart: unless-stopped
    environment:
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
      POSTGRES_DB: item_market
      TZ: Asia/Seoul
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # ddl.sql 은 최초 1회(빈 볼륨)에만 자동 실행된다.
      - ./db/ddl.sql:/docker-entrypoint-initdb.d/01_ddl.sql:ro
      # Orleans ADO.NET 클러스터링 스키마(멤버십). adonet 모드용. 최초 1회 자동 실행.
      - ./db/orleans-clustering.sql:/docker-entrypoint-initdb.d/02_orleans.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d item_market"]
      interval: 5s
      timeout: 5s
      retries: 10

  # SignalR 백플레인용 Redis(다중 인스턴스 실시간 푸시). 선택 사항 — 단일 인스턴스
  # 데모/테스트는 Redis 없이 인메모리로 동작하므로 이 서비스를 안 띄워도 무방하다.
  # 다중 인스턴스 클러스터 데모(scripts/run-cluster.sh)에서 Redis:ConnectionString 으로
  # 사용한다. 라이브 데모(:5080)와 포트가 겹치지 않아 함께 떠 있어도 방해되지 않는다.
  redis:
    image: redis:7
    container_name: ${REDIS_CONTAINER:-item-market-redis}
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 풀스택 프로필(app) — 기본 up 에서는 뜨지 않는다 ──────────────────────────
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER:-item-market-api}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # 컨테이너 밖(호스트)에서 접근 가능하도록 모든 인터페이스에 바인딩.
      Http__Host: "0.0.0.0"
      Http__Port: "8080"
      # 도커 네트워크 내부 서비스명으로 연결(호스트 포트 매핑과 무관).
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=item_market;Username=market;Password=market"
      Redis__ConnectionString: "redis:6379"
      Orleans__ClusteringMode: "localhost"
      # 브라우저에서 web 오리진으로 오는 요청을 CORS 허용.
      Cors__AllowedOrigin: "http://localhost:${WEB_PORT:-8081}"
    ports:
      - "${API_PORT:-8080}:8080"

  web:
    profiles: ["app"]
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ${WEB_CONTAINER:-item-market-web}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # 브라우저가 접근하는 API URL(호스트 포트). 컨테이너 시작 시 config.js 로 주입.
      VITE_API_BASE: "http://localhost:${API_PORT:-8080}"
    ports:
      - "${WEB_PORT:-8081}:80"

volumes:
  pgdata:
