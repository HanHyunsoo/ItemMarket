name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Solution1.sln

      - name: Build
        run: dotnet build Solution1.sln -c Release --no-restore

      # 3개 테스트 프로젝트 모두 실행. Integration/Banding 은 Testcontainers 로
      # 일회용 Postgres 를 띄운다 — ubuntu-latest 러너에 Docker 가 있어 그대로 동작한다.
      - name: Test — UnitTests
        run: dotnet test tests/ItemMarket.UnitTests -c Release --no-build

      - name: Test — IntegrationTests
        run: dotnet test tests/ItemMarket.IntegrationTests -c Release --no-build

      - name: Test — BandingTests
        run: dotnet test tests/ItemMarket.BandingTests -c Release --no-build

  frontend:
    name: frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
